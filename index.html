<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>근무 배정판</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --paper:#EEF1EE;
    --board:#FFFFFF;
    --line:#D9DFD8;
    --ink:#1E2A26;
    --ink-soft:#5B6862;
    --muted-bg:#E3E7E1;
    --muted-text:#95A099;
    --a:#2F5D62;
    --a-bg:#E4EEEC;
    --b:#B5652A;
    --b-bg:#F5E7DA;
    --vac:#A63446;
    --danger:#A63446;
    --shadow:0 1px 2px rgba(30,42,38,0.06), 0 6px 16px rgba(30,42,38,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  .top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
    flex-wrap:wrap;
    gap:10px;
  }
  .top h1{
    font-size:22px;
    letter-spacing:-0.02em;
    margin:0;
    font-weight:800;
  }
  .top .sub{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .layout{
    display:grid;
    grid-template-columns:280px 1fr;
    gap:20px;
    align-items:start;
  }
  @media (max-width:860px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--board);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:var(--shadow);
    padding:16px;
  }
  .panel + .panel{margin-top:16px;}
  .panel h2{
    font-size:13px;
    font-weight:700;
    margin:0 0 12px;
    color:var(--ink-soft);
    letter-spacing:0.02em;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .row{display:flex; gap:6px; margin-bottom:8px;}
  input[type=text], input[type=date], select{
    font-family:inherit;
    font-size:13px;
    padding:7px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
  }
  input[type=text]{flex:1; min-width:0;}
  button{
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    border:none;
    border-radius:6px;
    padding:7px 12px;
    cursor:pointer;
    background:var(--ink);
    color:#fff;
  }
  button.secondary{
    background:#fff;
    border:1px solid var(--line);
    color:var(--ink);
  }
  button.ghost{
    background:transparent;
    color:var(--ink-soft);
    padding:4px 6px;
    font-weight:500;
  }
  button.danger{background:var(--danger); color:#fff;}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  .group-toggle{display:flex; gap:6px; margin-bottom:8px;}
  .group-toggle label{
    flex:1;
    text-align:center;
    padding:6px 4px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .group-toggle input{display:none;}
  .group-toggle input:checked + span{}
  .group-toggle label.a-on{background:var(--a-bg); border-color:var(--a); color:var(--a);}
  .group-toggle label.b-on{background:var(--b-bg); border-color:var(--b); color:var(--b);}

  .person-item{
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    margin-bottom:8px;
    cursor:pointer;
    transition:box-shadow .12s ease;
  }
  .person-item:hover{box-shadow:var(--shadow);}
  .person-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
  }
  .person-name{font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.a{background:var(--a);}
  .dot.b{background:var(--b);}
  .count-row{display:flex; align-items:center; justify-content:space-between; margin-top:6px; gap:8px;}
  .count-badge{font-size:11px; color:var(--ink-soft); background:var(--muted-bg); border-radius:20px; padding:2px 9px;}
  .count-badge b{color:var(--ink);}
  .target-field{font-size:11px; color:var(--ink-soft); display:flex; align-items:center; gap:5px;}
  .target-field input{width:52px; font-size:11px; padding:3px 5px;}
  .rule-row{
    display:flex;
    gap:14px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
    font-size:12px;
    color:var(--ink-soft);
  }
  .rule-row label{display:flex; align-items:center; gap:5px; cursor:pointer;}
  .detail-cell{
    background:var(--board);
    border:1px solid var(--line);
    border-radius:6px;
    min-height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    cursor:pointer;
    color:var(--ink);
  }
  .detail-cell.empty{background:transparent; border:none; cursor:default;}
  .detail-cell.off{background:var(--muted-bg); color:var(--muted-text);}
  .detail-cell.vac{background:#F6EDEC; color:var(--vac); border-color:#EAD4D2; font-weight:800;}
  .stat-summary{display:flex; gap:8px;}
  .stat-box{
    flex:1;
    background:var(--muted-bg);
    border-radius:10px;
    padding:10px 4px;
    text-align:center;
  }
  .stat-box-num{font-size:22px; font-weight:800; color:var(--ink); line-height:1.1;}
  .stat-box-label{font-size:11px; color:var(--ink-soft); margin-top:3px;}

  .detail-controls{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  .detail-ctl{
    flex:1;
    background:var(--muted-bg);
    border-radius:10px;
    padding:9px 10px;
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:center;
  }
  .detail-ctl-label{font-size:11px; color:var(--ink-soft); font-weight:700;}
  .group-toggle-sm{margin-bottom:0; width:100%;}
  .group-toggle-sm label{padding:5px 4px; font-size:12px;}
  .stepper{display:flex; align-items:center; gap:0; width:100%;}
  .stepper button{
    width:30px; height:32px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--ink);
    font-size:16px; font-weight:700;
    padding:0;
    cursor:pointer;
  }
  .stepper button:first-child{border-radius:8px 0 0 8px;}
  .stepper button:last-child{border-radius:0 8px 8px 0;}
  .target-input{
    flex:1;
    width:100%;
    min-width:0;
    text-align:center;
    font-size:14px;
    font-weight:700;
    height:32px;
    padding:0 2px;
    border:1px solid var(--line);
    border-left:none; border-right:none;
    background:#fff;
    color:var(--ink);
  }
  .target-input:focus{outline:none;}
  .target-input::placeholder{font-weight:400; color:var(--muted-text); font-size:12px;}
  .target-input::-webkit-outer-spin-button,
  .target-input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .target-input{-moz-appearance:textfield;}
  .vac-head{display:flex; align-items:baseline; justify-content:space-between;}
  .vac-hint{font-size:11px; color:var(--muted-text);}
  .person-vac-row{display:flex; gap:4px; margin-top:6px;}
  .person-vac-row input{flex:1; font-size:12px; padding:5px 6px;}
  .vac-chips{display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;}
  .chip{
    font-size:11px;
    background:#F6EDEC;
    color:var(--vac);
    border:1px solid #EAD4D2;
    border-radius:20px;
    padding:2px 8px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .chip button{
    background:none; padding:0; color:var(--vac); font-size:12px; font-weight:800; line-height:1;
  }
  .holiday-chip{
    font-size:12px;
    background:var(--muted-bg);
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:20px;
    padding:3px 9px;
    display:flex;
    align-items:center;
    gap:6px;
    margin:0 6px 6px 0;
  }
  .holiday-chip button{background:none; color:var(--ink-soft); padding:0; font-weight:800;}
  .holiday-list{display:flex; flex-wrap:wrap;}
  .hol-month-group{margin-bottom:10px;}
  .hol-month-group:last-child{margin-bottom:0;}
  .hol-month-heading{
    font-size:11px;
    font-weight:800;
    color:var(--ink-soft);
    margin-bottom:5px;
    padding-bottom:3px;
    border-bottom:1px solid var(--line);
  }

  .cal-nav{display:flex; align-items:center; gap:10px;}
  .cal-nav .ym{font-size:16px; font-weight:800; min-width:110px; text-align:center;}
  .cal-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
    flex-wrap:wrap;
    gap:10px;
  }
  .stat{font-size:12px; color:var(--ink-soft);}
  .stat b{color:var(--ink);}

  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .dow{
    text-align:center;
    font-size:11px;
    font-weight:700;
    color:var(--ink-soft);
    padding-bottom:4px;
  }
  .dow.sun{color:var(--vac);}
  .cell{
    background:var(--board);
    border:1px solid var(--line);
    border-radius:8px;
    min-height:104px;
    padding:6px 6px 8px;
    display:flex;
    flex-direction:column;
    cursor:pointer;
    transition:box-shadow .12s ease, transform .12s ease;
  }
  .cell:hover{box-shadow:var(--shadow); transform:translateY(-1px);}
  .cell.empty{background:transparent; border:none; cursor:default;}
  .cell.off{
    background:var(--muted-bg);
    color:var(--muted-text);
    cursor:default;
  }
  .cell.off:hover{box-shadow:none; transform:none;}
  .slot.locked-slot{outline:1.5px solid var(--a); outline-offset:-1px; cursor:default;}
  .cell .datenum{font-size:12px; font-weight:700;}
  .cell.off .datenum{color:var(--muted-text);}
  .cell .label{font-size:10px; margin-top:1px; color:var(--muted-text);}
  .slots{margin-top:auto; display:flex; flex-direction:column; gap:4px;}
  .slot{
    font-size:12px;
    font-weight:700;
    border-radius:5px;
    padding:5px 7px;
    line-height:1.25;
    border-left:3px solid transparent;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .slot.a{background:var(--a-bg); color:#1E4A4F; border-left-color:var(--a);}
  .slot.b{background:var(--b-bg); color:#7A3F13; border-left-color:var(--b);}
  .slot.empty{
    border:1px dashed var(--line);
    color:var(--muted-text);
    background:transparent;
    text-align:center;
    border-left:1px dashed var(--line);
  }
  .slot.fail{
    border:1px dashed #E0B3AE;
    color:var(--vac);
    background:#FBF0EF;
    text-align:center;
  }
  .slot.draggable{cursor:grab;}
  .slot.dragging{opacity:0.4;}
  .slot.drop-target{outline:2px dashed var(--a); outline-offset:1px;}

  /* modal */
  .overlay{
    position:fixed; inset:0; background:rgba(30,42,38,0.35);
    display:none; align-items:center; justify-content:center; z-index:50;
    padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff;
    border-radius:12px;
    padding:20px;
    width:100%;
    max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
  }
  .modal h3{margin:0 0 2px; font-size:15px; font-weight:800;}
  .modal .mdate{font-size:12px; color:var(--ink-soft); margin-bottom:14px;}
  .modal .field{margin-bottom:12px;}
  .modal .field label{font-size:12px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:5px;}
  .modal select{width:100%;}
  .modal-actions{display:flex; gap:8px; margin-top:16px;}
  .sel-row{display:flex; gap:6px; align-items:center;}
  .sel-row select{flex:1;}
  .lock-btn{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:16px;
    padding:5px 8px;
    cursor:pointer;
    opacity:0.5;
  }
  .lock-btn.on{opacity:1; background:var(--a-bg); border-color:var(--a);}
  .modal-actions button{flex:1;}
  .warn{font-size:12px; color:var(--vac); margin-top:8px; line-height:1.4;}
  .empty-msg{font-size:12px; color:var(--ink-soft); padding:6px 0;}
  .footer-note{font-size:11px; color:var(--muted-text); margin-top:18px; line-height:1.6;}
  .alist-row{
    display:grid;
    grid-template-columns:96px 1fr 1fr auto;
    align-items:center;
    gap:8px;
    padding:7px 4px;
    border-bottom:1px solid var(--line);
    font-size:12px;
  }
  .alist-row:last-child{border-bottom:none;}
  .alist-date{font-weight:700; color:var(--ink-soft);}
  .alist-tag{
    font-size:11px; font-weight:700; border-radius:5px; padding:3px 7px; display:inline-block;
  }
  .alist-tag.a{background:var(--a-bg); color:var(--a);}
  .alist-tag.b{background:var(--b-bg); color:var(--b);}
  .alist-tag.empty{color:var(--muted-text);}
  .alist-row button{padding:4px 9px;}

  .tabbar{display:flex; gap:4px; margin-bottom:12px;}
  .tab-btn{
    flex:1;
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:8px 8px 0 0;
    border-bottom:none;
    padding:9px 6px;
    font-size:13px;
  }
  .tab-btn.active{
    background:var(--board);
    color:var(--ink);
    box-shadow:var(--shadow);
  }
  .pick-chip{
    font-size:12px;
    border:1px solid var(--line);
    border-radius:20px;
    padding:4px 10px;
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
    user-select:none;
  }
  .pick-chip input{margin:0;}
  .conflict-item{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    margin-bottom:8px;
  }
  .stats-row{
    display:grid;
    grid-template-columns:1fr auto auto auto;
    align-items:center;
    gap:8px;
    padding:7px 4px;
    border-bottom:1px solid var(--line);
    font-size:12px;
  }
  .stats-row:last-child{border-bottom:none;}
  .stats-name{font-weight:700; display:flex; align-items:center; gap:6px;}
  .stats-num{font-size:12px; color:var(--ink-soft); text-align:right; min-width:52px;}
  .stats-num b{color:var(--ink); font-size:13px;}
  .stats-head{
    display:grid;
    grid-template-columns:1fr auto auto auto;
    gap:8px;
    padding:0 4px 6px;
    font-size:11px;
    color:var(--muted-text);
    border-bottom:1px solid var(--line);
    margin-bottom:2px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <h1>근무 배정판</h1>
    </div>
  </div>

  <div class="layout">
    <div>
      <div class="panel">
        <h2>인원 관리</h2>
        <div class="row">
          <input id="pName" type="text" placeholder="이름" />
        </div>
        <div class="group-toggle" id="addGroupToggle">
          <label class="a-on" data-g="A"><input type="radio" name="addGroup" value="A" checked /><span>그룹 A</span></label>
          <label data-g="B"><input type="radio" name="addGroup" value="B" /><span>그룹 B</span></label>
        </div>
        <button id="addPersonBtn" style="width:100%">인원 추가</button>

        <div class="rule-row">
          <label><input type="checkbox" id="ruleA" /> 그룹 A 중복배정</label>
          <label><input type="checkbox" id="ruleB" checked /> 그룹 B 중복배정</label>
        </div>

        <div id="peopleList" style="margin-top:14px;"></div>
      </div>

      <div class="panel">
        <h2>공휴일 관리 (이번 달)</h2>
        <div class="row">
          <input id="holDate" type="date" />
        </div>
        <div class="row">
          <input id="holLabel" type="text" placeholder="휴일명 (예: 대체공휴일)" />
        </div>
        <button id="addHolBtn" class="secondary" style="width:100%">공휴일 추가</button>
        <div id="holidayList" style="margin-top:12px;"></div>
        <div class="footer-note">신정·삼일절·어린이날·현충일·제헌절·광복절·개천절·한글날·성탄절과, 설날·추석·부처님오신날(음력 기반) 및 대체공휴일이 자동으로 계산되어 등록됩니다. 법령 개정 등으로 실제와 다를 수 있으니 필요하면 직접 추가·삭제해 주세요.</div>
      </div>

      <div class="panel">
        <h2>데이터</h2>
        <div class="row">
          <button class="secondary" id="exportBtn" style="flex:1">내보내기</button>
          <button class="secondary" id="importBtn" style="flex:1">불러오기</button>
          <input id="importFile" type="file" accept="application/json" style="display:none" />
        </div>
        <div class="footer-note">이 페이지는 새로고침하면 데이터가 사라집니다. 작업 후 내보내기로 저장하고, 다음에 불러오기로 이어서 사용하세요.</div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="cal-toolbar">
          <div class="cal-nav">
            <button class="secondary" id="prevBtn">‹</button>
            <div class="ym" id="ymLabel"></div>
            <button class="secondary" id="nextBtn">›</button>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <span class="stat" id="statLabel"></span>
            <button class="secondary" id="resetBtn">초기화</button>
            <button class="secondary" id="resetAllBtn">전체 초기화</button>
            <button id="autoBtn">이번 달 자동 배정</button>
          </div>
        </div>
        <div class="grid" id="dowRow"></div>
        <div class="grid" id="calGrid" style="margin-top:6px;"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>근무자 지정</h3>
    <div class="mdate" id="modalDate"></div>
    <div class="field">
      <label>근무자 1</label>
      <div class="sel-row">
        <select id="sel1"></select>
        <button type="button" class="lock-btn" id="lock1" title="이 사람 고정: 초기화·자동 배정이 이 자리를 바꾸지 않음">🔓</button>
      </div>
    </div>
    <div class="field">
      <label>근무자 2</label>
      <div class="sel-row">
        <select id="sel2"></select>
        <button type="button" class="lock-btn" id="lock2" title="이 사람 고정: 초기화·자동 배정이 이 자리를 바꾸지 않음">🔓</button>
      </div>
    </div>
    <div id="modalWarn"></div>
    <div class="modal-actions">
      <button class="secondary" id="modalCancel">닫기</button>
      <button class="danger" id="modalClear">배정 해제</button>
      <button id="modalSave">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal" style="max-width:400px;">
    <h3 id="detailName" style="margin-bottom:16px;">상세설정</h3>

    <div class="detail-controls">
      <div class="detail-ctl">
        <span class="detail-ctl-label">그룹</span>
        <div class="group-toggle group-toggle-sm" id="detailGroupToggle">
          <label data-g="A"><input type="radio" name="detailGroup" value="A" /><span>A</span></label>
          <label data-g="B"><input type="radio" name="detailGroup" value="B" /><span>B</span></label>
        </div>
      </div>
      <div class="detail-ctl">
        <span class="detail-ctl-label">목표 횟수</span>
        <div class="stepper">
          <button type="button" id="targetMinus">−</button>
          <input type="number" min="0" id="detailTarget" class="target-input" placeholder="자동" />
          <button type="button" id="targetPlus">+</button>
        </div>
      </div>
    </div>

    <div id="detailStats" style="margin-bottom:16px;"></div>

    <div class="field" style="margin-bottom:8px;">
      <div class="vac-head">
        <label style="margin-bottom:0;">휴가</label>
        <span class="vac-hint">날짜를 눌러 지정/해제</span>
      </div>
      <div class="cal-nav" style="margin:8px 0; justify-content:center;">
        <button class="secondary" type="button" id="detailPrevBtn">‹</button>
        <div class="ym" id="detailYm" style="font-size:14px; min-width:90px;"></div>
        <button class="secondary" type="button" id="detailNextBtn">›</button>
      </div>
      <div class="grid" id="detailDowRow"></div>
      <div class="grid" id="detailCalGrid" style="margin-top:4px;"></div>
    </div>

    <div class="modal-actions">
      <button id="detailClose" style="flex:1;">닫기</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/korean-lunar-calendar/dist/korean-lunar-calendar.min.js"></script>
<script>
(function(){
  "use strict";

  // ---------- state ----------
  const state = {
    people: [],        // {id, name, group}
    holidays: {},       // 'YYYY-MM-DD' -> label
    vacations: {},       // personId -> ['YYYY-MM-DD', ...]
    assignments: {},     // 'YYYY-MM-DD' -> [personId, personId]
    groupRules: {A:false, B:true}, // 같은 그룹끼리 함께 배정 가능 여부
    locked: {}, // 'YYYY-MM-DD' -> [bool, bool] (각 자리의 사람 고정 여부)
    viewYear: null,
    viewMonth: null,     // 0-indexed
    editingDate: null,
    detailPersonId: null,
    detailYear: null,
    detailMonth: null
  };

  const today = new Date();
  state.viewYear = today.getFullYear();
  state.viewMonth = today.getMonth();

  let uidCounter = 1;
  function uid(){ return 'p' + (uidCounter++) + '_' + Math.random().toString(36).slice(2,7); }

  function pad(n){ return String(n).padStart(2,'0'); }
  function iso(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
  function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }
  function addDaysISO(s, delta){
    const d = parseISO(s);
    d.setDate(d.getDate()+delta);
    return iso(d.getFullYear(), d.getMonth(), d.getDate());
  }

  function lunarToSolarISO(year, lmonth, lday){
    const cal = new KoreanLunarCalendar();
    cal.setLunarDate(year, lmonth, lday, false);
    const s = cal.getSolarCalendar();
    return iso(s.year, s.month-1, s.day);
  }

  function ensureLunarHolidays(y, setFn){
    if(typeof KoreanLunarCalendar === 'undefined') return;
    try{
      const seol = lunarToSolarISO(y,1,1);
      setFn(addDaysISO(seol,-1), '설날 연휴');
      setFn(seol, '설날');
      setFn(addDaysISO(seol,1), '설날 연휴');

      const chuseok = lunarToSolarISO(y,8,15);
      setFn(addDaysISO(chuseok,-1), '추석 연휴');
      setFn(chuseok, '추석');
      setFn(addDaysISO(chuseok,1), '추석 연휴');

      const buddha = lunarToSolarISO(y,4,8);
      setFn(buddha, '부처님오신날');
    }catch(e){
      console.warn('lunar holiday calculation failed for', y, e);
    }
  }

  function addSubstituteHolidays(){
    const targets = ['어린이날','삼일절','광복절','개천절','한글날','제헌절','설날','설날 연휴','추석','추석 연휴','부처님오신날'];
    const entries = Object.keys(state.holidays)
      .filter(k => targets.includes(state.holidays[k]))
      .sort();
    entries.forEach(ds=>{
      const dow = parseISO(ds).getDay();
      if(dow===0 || dow===6){
        // 이 공휴일 다음의 연속된 휴일(주말·다른 공휴일)을 모두 건너뛴 첫 평일을 찾는다.
        // 이미 그 자리에 대체공휴일이 등록돼 있으면 다시 만들지 않는다(재실행 시 중복 방지).
        let cand = addDaysISO(ds,1);
        for(let i=0;i<10;i++){
          const cdow = parseISO(cand).getDay();
          const occupied = cand in state.holidays;
          if(cdow!==0 && cdow!==6 && !occupied){
            state.holidays[cand] = '대체공휴일';
            break;
          }
          // 평일인데 이미 대체공휴일이면 이 공휴일의 대체는 이미 처리된 것 → 중복 생성 중단
          if(cdow!==0 && cdow!==6 && state.holidays[cand]==='대체공휴일'){
            break;
          }
          cand = addDaysISO(cand,1);
        }
      }
    });
  }

  function ensureDefaultHolidays(){
    const fixed = [
      ['01-01','신정'], ['03-01','삼일절'], ['05-05','어린이날'],
      ['06-06','현충일'], ['07-17','제헌절'], ['08-15','광복절'], ['10-03','개천절'],
      ['10-09','한글날'], ['12-25','성탄절']
    ];
    const lo = Math.min(today.getFullYear(), state.viewYear) - 1;
    const hi = Math.max(today.getFullYear(), state.viewYear) + 1;
    for(let y = lo; y <= hi; y++){
      fixed.forEach(([md,label])=>{
        const key = `${y}-${md}`;
        if(!(key in state.holidays)) state.holidays[key] = label;
      });
      ensureLunarHolidays(y, (dateStr, label)=>{
        if(!(dateStr in state.holidays)) state.holidays[dateStr] = label;
      });
    }
    addSubstituteHolidays();
  }
  ensureDefaultHolidays();

  function isWeekend(dateObj){
    const d = dateObj.getDay();
    return d===0 || d===6;
  }
  function isHoliday(dateStr){
    return Object.prototype.hasOwnProperty.call(state.holidays, dateStr);
  }
  function isWorkingDay(dateStr){
    const d = parseISO(dateStr);
    if(isWeekend(d)) return false;
    if(isHoliday(dateStr)) return false;
    return true;
  }
  function isOnVacation(personId, dateStr){
    const list = state.vacations[personId] || [];
    return list.includes(dateStr);
  }
  function getAdjacentWorkingDay(dateStr, dir){
    let cur = dateStr;
    for(let i=0;i<14;i++){
      cur = addDaysISO(cur, dir);
      if(isWorkingDay(cur)) return cur;
    }
    return null;
  }
  function getAssigned(dateStr){
    return state.assignments[dateStr] || [];
  }
  function personById(id){
    return state.people.find(p=>p.id===id);
  }

  // ---------- people management ----------
  function addPerson(name, group){
    if(!name.trim()) return;
    state.people.push({id: uid(), name: name.trim(), group, target: null});
    renderPeople();
    renderCalendar();
  }
  function deletePerson(id){
    state.people = state.people.filter(p=>p.id!==id);
    delete state.vacations[id];
    Object.keys(state.assignments).forEach(d=>{
      state.assignments[d] = state.assignments[d].filter(pid=>pid!==id);
      if(state.assignments[d].length===0) delete state.assignments[d];
    });
    renderPeople();
    renderCalendar();
  }
  function setTarget(id, value){
    const p = personById(id);
    if(!p) return;
    if(value===''||value===null||isNaN(value)){
      p.target = null;
    } else {
      p.target = Math.max(0, parseInt(value,10));
    }
    renderPeople();
  }
  function countForMonth(personId, year, month){
    let c = 0;
    Object.keys(state.assignments).forEach(ds=>{
      const d = parseISO(ds);
      if(d.getFullYear()===year && d.getMonth()===month && state.assignments[ds].includes(personId)) c++;
    });
    return c;
  }
  function addVacationRange(personId, startStr, endStr){
    if(!startStr) return;
    const end = endStr || startStr;
    if(parseISO(end) < parseISO(startStr)) return;
    if(!state.vacations[personId]) state.vacations[personId]=[];
    let cur = startStr;
    let guard = 0;
    while(guard < 370){
      if(!state.vacations[personId].includes(cur)) state.vacations[personId].push(cur);
      if(cur===end) break;
      cur = addDaysISO(cur, 1);
      guard++;
    }
    state.vacations[personId].sort();
    renderPeople();
    renderCalendar();
  }
  function removeVacation(personId, dateStr){
    if(!state.vacations[personId]) return;
    state.vacations[personId] = state.vacations[personId].filter(d=>d!==dateStr);
    renderPeople();
    renderCalendar();
  }

  // ---------- group rules (같은 그룹끼리 함께 배정 가능 여부) ----------
  function pairValid(id1, id2){
    if(id1===id2) return false;
    const p1 = personById(id1), p2 = personById(id2);
    if(!p1 || !p2) return false;
    if(p1.group===p2.group){
      return !!state.groupRules[p1.group];
    }
    return true;
  }

  function renderPeople(){
    const wrap = document.getElementById('peopleList');
    wrap.innerHTML='';
    if(state.people.length===0){
      wrap.innerHTML = '<div class="empty-msg">등록된 인원이 없습니다.</div>';
      return;
    }
    state.people.forEach(p=>{
      const item = document.createElement('div');
      item.className='person-item';
      item.setAttribute('data-detail', p.id);
      const monthCount = countForMonth(p.id, state.viewYear, state.viewMonth);
      item.innerHTML = `
        <div class="person-head">
          <div class="person-name"><span class="dot ${p.group==='A'?'a':'b'}"></span>${escapeHtml(p.name)} <span style="color:var(--ink-soft); font-weight:500;">· ${p.group}</span></div>
          <button class="danger" data-del="${p.id}">삭제</button>
        </div>
        <div class="count-row">
          <span class="count-badge">이번 달 <b>${monthCount}</b>회</span>
        </div>
      `;
      wrap.appendChild(item);
    });

    wrap.querySelectorAll('[data-del]').forEach(b=>{
      b.addEventListener('click', (e)=>{
        e.stopPropagation();
        deletePerson(b.getAttribute('data-del'));
      });
    });
    wrap.querySelectorAll('.person-item[data-detail]').forEach(el=>{
      el.addEventListener('click', ()=> openDetailModal(el.getAttribute('data-detail')));
    });
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- detail modal (그룹 / 목표 / 휴가) ----------
  const detailOverlay = document.getElementById('detailOverlay');
  const detailTargetInput = document.getElementById('detailTarget');

  function openDetailModal(personId){
    const p = personById(personId);
    if(!p) return;
    state.detailPersonId = personId;
    state.detailYear = state.viewYear;
    state.detailMonth = state.viewMonth;

    document.getElementById('detailName').textContent = `${p.name} 상세설정`;
    document.querySelectorAll('input[name="detailGroup"]').forEach(r=>{ r.checked = (r.value===p.group); });
    updateGroupToggleStyle('detailGroupToggle');
    detailTargetInput.value = p.target===null ? '' : p.target;

    renderDetailStats(personId);
    renderDetailCalendar();
    detailOverlay.classList.add('show');
  }
  function closeDetailModal(){
    detailOverlay.classList.remove('show');
    state.detailPersonId = null;
  }
  function renderDetailStats(personId){
    const wrap = document.getElementById('detailStats');
    let total = 0, thisMonthCnt = 0;
    const thisYm = `${state.detailYear}-${pad(state.detailMonth+1)}`;
    Object.keys(state.assignments).forEach(ds=>{
      if(state.assignments[ds].includes(personId)){
        total++;
        if(ds.slice(0,7)===thisYm) thisMonthCnt++;
      }
    });
    wrap.innerHTML = `<div class="stat-summary">
      <div class="stat-box"><div class="stat-box-num">${total}</div><div class="stat-box-label">총 지정</div></div>
      <div class="stat-box"><div class="stat-box-num">${thisMonthCnt}</div><div class="stat-box-label">${state.detailMonth+1}월</div></div>
    </div>`;
  }
  function toggleVacationDay(personId, dateStr){
    if(isOnVacation(personId, dateStr)) removeVacation(personId, dateStr);
    else addVacationRange(personId, dateStr, dateStr);
    renderDetailCalendar();
  }
  function renderDetailCalendar(){
    const pid = state.detailPersonId;
    if(!pid) return;
    const y = state.detailYear, m = state.detailMonth;
    document.getElementById('detailYm').textContent = `${y}년 ${m+1}월`;
    renderDowRow('detailDowRow');

    const wrap = document.getElementById('detailCalGrid');
    wrap.innerHTML='';
    const firstDay = new Date(y, m, 1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();

    for(let i=0;i<startOffset;i++){
      const e = document.createElement('div');
      e.className='detail-cell empty';
      wrap.appendChild(e);
    }
    for(let d=1; d<=daysInMonth; d++){
      const ds = iso(y,m,d);
      const dateObj = new Date(y,m,d);
      const off = isWeekend(dateObj) || isHoliday(ds);
      const vac = isOnVacation(pid, ds);
      const cell = document.createElement('div');
      cell.className = 'detail-cell' + (off?' off':'') + (vac?' vac':'');
      cell.textContent = d;
      cell.addEventListener('click', ()=> toggleVacationDay(pid, ds));
      wrap.appendChild(cell);
    }
  }

  document.getElementById('detailGroupToggle').addEventListener('change', ()=>{
    const pid = state.detailPersonId;
    if(!pid) return;
    const p = personById(pid);
    const group = document.querySelector('input[name="detailGroup"]:checked').value;
    p.group = group;
    updateGroupToggleStyle('detailGroupToggle');
    renderPeople();
    renderCalendar();
  });
  detailTargetInput.addEventListener('change', ()=>{
    if(!state.detailPersonId) return;
    setTarget(state.detailPersonId, detailTargetInput.value);
  });
  document.getElementById('targetMinus').addEventListener('click', ()=>{
    if(!state.detailPersonId) return;
    const cur = detailTargetInput.value==='' ? 0 : parseInt(detailTargetInput.value,10);
    const next = Math.max(0, cur-1);
    detailTargetInput.value = next;
    setTarget(state.detailPersonId, String(next));
  });
  document.getElementById('targetPlus').addEventListener('click', ()=>{
    if(!state.detailPersonId) return;
    const cur = detailTargetInput.value==='' ? 0 : parseInt(detailTargetInput.value,10);
    const next = cur+1;
    detailTargetInput.value = next;
    setTarget(state.detailPersonId, String(next));
  });
  document.getElementById('detailPrevBtn').addEventListener('click', ()=>{
    state.detailMonth--;
    if(state.detailMonth<0){ state.detailMonth=11; state.detailYear--; }
    ensureDefaultHolidays();
    renderDetailCalendar();
    renderDetailStats(state.detailPersonId);
  });
  document.getElementById('detailNextBtn').addEventListener('click', ()=>{
    state.detailMonth++;
    if(state.detailMonth>11){ state.detailMonth=0; state.detailYear++; }
    ensureDefaultHolidays();
    renderDetailCalendar();
    renderDetailStats(state.detailPersonId);
  });
  document.getElementById('detailClose').addEventListener('click', closeDetailModal);
  detailOverlay.addEventListener('click', (e)=>{ if(e.target===detailOverlay) closeDetailModal(); });

  // ---------- holidays management ----------
  function addHoliday(dateStr, label){
    if(!dateStr) return;
    state.holidays[dateStr] = label && label.trim() ? label.trim() : '휴일';
    renderHolidays();
    renderCalendar();
  }
  function removeHoliday(dateStr){
    delete state.holidays[dateStr];
    renderHolidays();
    renderCalendar();
  }
  function renderHolidays(){
    const wrap = document.getElementById('holidayList');
    wrap.innerHTML='';
    const prefix = `${state.viewYear}-${pad(state.viewMonth+1)}`;
    const keys = Object.keys(state.holidays).filter(k=>k.startsWith(prefix)).sort();
    if(keys.length===0){
      wrap.innerHTML = '<div class="empty-msg">이번 달에 등록된 공휴일이 없습니다.</div>';
      return;
    }
    const chipRow = document.createElement('div');
    chipRow.className='holiday-list';
    keys.forEach(k=>{
      const chip = document.createElement('span');
      chip.className='holiday-chip';
      chip.innerHTML = `${k.slice(8,10)}일 ${escapeHtml(state.holidays[k])} <button data-holdel="${k}">×</button>`;
      chipRow.appendChild(chip);
    });
    wrap.appendChild(chipRow);
    wrap.querySelectorAll('[data-holdel]').forEach(b=>{
      b.addEventListener('click', ()=> removeHoliday(b.getAttribute('data-holdel')));
    });
  }

  // ---------- calendar rendering ----------
  const DOW = ['일','월','화','수','목','금','토'];

  function renderDowRow(containerId){
    const wrap = document.getElementById(containerId || 'dowRow');
    wrap.innerHTML='';
    DOW.forEach((d,i)=>{
      const el = document.createElement('div');
      el.className = 'dow' + (i===0?' sun':'');
      el.textContent = d;
      wrap.appendChild(el);
    });
  }

  function renderCalendar(){
    document.getElementById('ymLabel').textContent = `${state.viewYear}년 ${state.viewMonth+1}월`;
    renderHolidays();

    const grid = document.getElementById('calGrid');
    grid.innerHTML='';

    const firstDay = new Date(state.viewYear, state.viewMonth, 1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(state.viewYear, state.viewMonth+1, 0).getDate();

    for(let i=0;i<startOffset;i++){
      const e = document.createElement('div');
      e.className='cell empty';
      grid.appendChild(e);
    }

    let workingCount=0, assignedCount=0;

    for(let d=1; d<=daysInMonth; d++){
      const dateStr = iso(state.viewYear, state.viewMonth, d);
      const dateObj = new Date(state.viewYear, state.viewMonth, d);
      const weekend = isWeekend(dateObj);
      const holiday = isHoliday(dateStr);
      const off = weekend || holiday;

      const cell = document.createElement('div');
      cell.className = 'cell' + (off ? ' off' : '');

      const num = document.createElement('div');
      num.className='datenum';
      num.textContent = d;
      cell.appendChild(num);

      if(off){
        const lbl = document.createElement('div');
        lbl.className='label';
        lbl.textContent = holiday ? state.holidays[dateStr] : (dateObj.getDay()===0?'일요일':'토요일');
        cell.appendChild(lbl);
      } else {
        workingCount++;
        const slots = document.createElement('div');
        slots.className='slots';
        const assigned = getAssigned(dateStr);
        const lk = state.locked[dateStr] || [false,false];
        if(assigned.length===2 && (assigned[0] || assigned[1])){
          if(assigned[0] && assigned[1]) assignedCount++;
          assigned.forEach((pid, slotIdx)=>{
            const person = pid ? personById(pid) : null;
            const s = document.createElement('div');
            if(person){
              s.className = 'slot draggable ' + (person.group==='A' ? 'a':'b') + (lk[slotIdx] ? ' locked-slot' : '');
              s.textContent = (lk[slotIdx] ? '🔒 ' : '') + person.name;
              s.setAttribute('draggable', lk[slotIdx] ? 'false' : 'true');
              s.dataset.date = dateStr;
              s.dataset.slot = slotIdx;
              s.dataset.pid = pid;
              if(!lk[slotIdx]){
                s.addEventListener('dragstart', onSlotDragStart);
                s.addEventListener('dragend', onSlotDragEnd);
              }
              s.addEventListener('dragover', onSlotDragOver);
              s.addEventListener('dragleave', onSlotDragLeave);
              s.addEventListener('drop', onSlotDrop);
              s.addEventListener('click', (e)=>{ e.stopPropagation(); openModal(dateStr); });
            } else if(pid){
              s.className = 'slot empty';
              s.textContent = '(삭제된 인원)';
            } else {
              s.className = 'slot empty';
              s.textContent = '미배정';
            }
            slots.appendChild(s);
          });
        } else {
          for(let i=0;i<2;i++){
            const s = document.createElement('div');
            s.className='slot empty';
            s.textContent = '미배정';
            slots.appendChild(s);
          }
        }
        cell.appendChild(slots);
        cell.addEventListener('click', ()=> openModal(dateStr));
      }

      grid.appendChild(cell);
    }

    document.getElementById('statLabel').innerHTML =
      `근무일 <b>${workingCount}</b>일 · 배정완료 <b>${assignedCount}</b>일`;
  }

  // ---------- drag & drop swap (PC) ----------
  let dragInfo = null;

  function onSlotDragStart(e){
    dragInfo = { date: this.dataset.date, slot: parseInt(this.dataset.slot,10), pid: this.dataset.pid };
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try{ e.dataTransfer.setData('text/plain', this.dataset.pid); }catch(_){}
  }
  function onSlotDragEnd(){
    this.classList.remove('dragging');
    document.querySelectorAll('.slot.drop-target').forEach(el=>el.classList.remove('drop-target'));
    dragInfo = null;
  }
  function onSlotDragOver(e){
    if(!dragInfo) return;
    if(this.dataset.date===dragInfo.date && parseInt(this.dataset.slot,10)===dragInfo.slot) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drop-target');
  }
  function onSlotDragLeave(){
    this.classList.remove('drop-target');
  }
  function onSlotDrop(e){
    e.preventDefault();
    e.stopPropagation();
    this.classList.remove('drop-target');
    if(!dragInfo) return;
    const srcDate = dragInfo.date, srcSlot = dragInfo.slot;
    const dstDate = this.dataset.date, dstSlot = parseInt(this.dataset.slot,10);
    if(srcDate===dstDate && srcSlot===dstSlot) return;
    trySwap(srcDate, srcSlot, dstDate, dstSlot);
  }

  function trySwap(srcDate, srcSlot, dstDate, dstSlot){
    const srcArr = (state.assignments[srcDate]||[]).slice();
    const dstArr = (state.assignments[dstDate]||[]).slice();
    if(srcArr.length!==2 || dstArr.length!==2) return;

    // 잠긴 자리는 교환 불가
    const srcLk = state.locked[srcDate] || [false,false];
    const dstLk = state.locked[dstDate] || [false,false];
    if(srcLk[srcSlot] || dstLk[dstSlot]){
      alert('고정된 자리는 교환할 수 없습니다.');
      return;
    }

    const srcPid = srcArr[srcSlot];
    const dstPid = dstArr[dstSlot];
    if(srcPid===dstPid) return;

    // 교환 후 각 날짜의 두 사람 구성
    const newSrc = srcArr.slice(); newSrc[srcSlot] = dstPid;
    const newDst = dstArr.slice(); newDst[dstSlot] = srcPid;

    const problems = [];
    function checkDay(ds, arr, movedPid){
      // 같은 날 두 명이 동일인이면 불가
      if(arr[0] && arr[1] && arr[0]===arr[1]){ problems.push('같은 사람이 한 날에 두 번 배정됩니다.'); return; }
      // 그룹 규칙 (양쪽 다 채워진 경우에만 검사)
      if(arr[0] && arr[1] && !pairValid(arr[0], arr[1])) problems.push(`${dateLabel(ds)}: 그룹 규칙 위반`);
      // 휴가
      if(isOnVacation(movedPid, ds)) problems.push(`${dateLabel(ds)}: 휴가일에 배정됨`);
      // 연속 배정 (앞/뒤 근무일)
      const prevWD = getAdjacentWorkingDay(ds,-1);
      const nextWD = getAdjacentWorkingDay(ds,1);
      if(prevWD && prevWD!==srcDate && prevWD!==dstDate && getAssigned(prevWD).includes(movedPid)) problems.push(`${dateLabel(ds)}: 연속 배정`);
      if(nextWD && nextWD!==srcDate && nextWD!==dstDate && getAssigned(nextWD).includes(movedPid)) problems.push(`${dateLabel(ds)}: 연속 배정`);
    }
    if(srcDate===dstDate){
      // 같은 날 안에서 두 자리 교환 → 순서만 바뀜, 항상 허용
      const arr = srcArr.slice();
      [arr[srcSlot], arr[dstSlot]] = [arr[dstSlot], arr[srcSlot]];
      state.assignments[srcDate] = arr;
      renderCalendar(); renderPeople();
      return;
    }
    checkDay(srcDate, newSrc, dstPid);
    checkDay(dstDate, newDst, srcPid);

    if(problems.length){
      alert('교환할 수 없습니다:\n' + [...new Set(problems)].join('\n'));
      return;
    }
    state.assignments[srcDate] = newSrc;
    state.assignments[dstDate] = newDst;
    renderCalendar();
    renderPeople();
  }

  function dateLabel(ds){
    const d = parseISO(ds);
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  // ---------- modal ----------
  const overlay = document.getElementById('overlay');
  const sel1 = document.getElementById('sel1');
  const sel2 = document.getElementById('sel2');

  function fillSelect(selectEl, list, selectedId, dateStr, otherId){
    selectEl.innerHTML='';
    const noneOpt = document.createElement('option');
    noneOpt.value=''; noneOpt.textContent='선택 안함';
    selectEl.appendChild(noneOpt);
    list.forEach(p=>{
      const opt = document.createElement('option');
      const reason = dateStr ? ineligibleReason(p.id, dateStr, otherId) : null;
      opt.value=p.id;
      opt.textContent = `${p.name} (${p.group})` + (reason ? ` ⚠ ${reason}` : '');
      if(p.id===selectedId) opt.selected=true;
      selectEl.appendChild(opt);
    });
  }

  function ineligibleReason(pid, dateStr, otherId){
    const reasons = [];
    if(isOnVacation(pid, dateStr)) reasons.push('휴가');
    const prevWD = getAdjacentWorkingDay(dateStr,-1);
    const nextWD = getAdjacentWorkingDay(dateStr,1);
    if((prevWD && getAssigned(prevWD).includes(pid)) || (nextWD && getAssigned(nextWD).includes(pid))) reasons.push('연속');
    if(otherId && !pairValid(pid, otherId)) reasons.push('그룹규칙');
    return reasons.length ? reasons.join('·') : null;
  }

  function refreshModalSelects(){
    const dateStr = state.editingDate;
    const currentAssigned = getAssigned(dateStr);
    const cur1 = sel1.value || currentAssigned[0] || '';
    const cur2 = sel2.value || currentAssigned[1] || '';

    // 조건과 상관없이 등록된 인원 전체를 후보로 보여준다
    const list1 = state.people.filter(p=> p.id!==cur2);
    const list2 = state.people.filter(p=> p.id!==cur1);

    fillSelect(sel1, list1, cur1, dateStr, cur2);
    fillSelect(sel2, list2, cur2, dateStr, cur1);

    const warn = document.getElementById('modalWarn');
    warn.innerHTML = state.people.length===0 ? '<div class="warn">등록된 인원이 없습니다.</div>' : '';
  }

  let pendingLock = [false, false];

  function updateLockBtns(){
    const b1 = document.getElementById('lock1'), b2 = document.getElementById('lock2');
    b1.textContent = pendingLock[0] ? '🔒' : '🔓'; b1.classList.toggle('on', !!pendingLock[0]);
    b2.textContent = pendingLock[1] ? '🔒' : '🔓'; b2.classList.toggle('on', !!pendingLock[1]);
  }

  function openModal(dateStr){
    state.editingDate = dateStr;
    document.getElementById('modalDate').textContent =
      `${dateStr} (${DOW[parseISO(dateStr).getDay()]}요일)`;

    sel1.value=''; sel2.value='';
    const assigned = getAssigned(dateStr);
    refreshModalSelects();
    if(assigned.length===2){
      sel1.value = assigned[0];
      sel2.value = assigned[1];
    }
    const lk = state.locked[dateStr];
    pendingLock = [!!(lk && lk[0]), !!(lk && lk[1])];
    updateLockBtns();
    overlay.classList.add('show');
  }
  function closeModal(){
    overlay.classList.remove('show');
    state.editingDate=null;
  }

  sel1.addEventListener('change', refreshModalSelects);
  sel2.addEventListener('change', refreshModalSelects);
  document.getElementById('lock1').addEventListener('click', ()=>{
    pendingLock[0] = !pendingLock[0];
    updateLockBtns();
  });
  document.getElementById('lock2').addEventListener('click', ()=>{
    pendingLock[1] = !pendingLock[1];
    updateLockBtns();
  });

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('modalClear').addEventListener('click', ()=>{
    delete state.assignments[state.editingDate];
    delete state.locked[state.editingDate];
    renderCalendar();
    renderPeople();
    closeModal();
  });
  document.getElementById('modalSave').addEventListener('click', ()=>{
    const id1 = sel1.value, id2 = sel2.value;
    const warn = document.getElementById('modalWarn');
    if(!id1 && !id2){
      warn.innerHTML = '<div class="warn">최소 한 명은 선택해 주세요.</div>';
      return;
    }
    if(id1 && id2 && id1===id2){
      warn.innerHTML = '<div class="warn">서로 다른 두 명을 선택해 주세요.</div>';
      return;
    }
    if(id1 && id2){
      if(!pairValid(id1,id2)){
        if(!confirm('그룹 규칙상 함께 배정할 수 없는 조합입니다. 그래도 지정할까요?')) return;
      }
    }
    state.assignments[state.editingDate] = [id1, id2];
    // 잠금은 자물쇠 버튼으로 지정한 자리만 반영 (지정=잠금 아님). 빈 자리의 잠금은 무의미하므로 제거.
    const lk = [id1 ? pendingLock[0] : false, id2 ? pendingLock[1] : false];
    if(lk[0] || lk[1]){
      state.locked[state.editingDate] = lk;
    } else {
      delete state.locked[state.editingDate];
    }
    renderCalendar();
    renderPeople();
    closeModal();
  });
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

  function updateGroupToggleStyle(containerId){
    const container = document.getElementById(containerId);
    container.querySelectorAll('label').forEach(l=>{
      const input = l.querySelector('input');
      l.classList.remove('a-on','b-on');
      if(input.checked) l.classList.add(input.value==='A' ? 'a-on' : 'b-on');
    });
  }

  // ---------- add-person group toggle ----------
  document.getElementById('addGroupToggle').addEventListener('change', ()=>{
    updateGroupToggleStyle('addGroupToggle');
  });

  // ---------- auto assign ----------
  function autoAssignMonth(){
    const y = state.viewYear, m = state.viewMonth;
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const workingDays = [];
    for(let d=1; d<=daysInMonth; d++){
      const ds = iso(y,m,d);
      if(isWorkingDay(ds)) workingDays.push(ds);
    }
    if(workingDays.length===0){
      alert('이번 달에는 근무일이 없습니다.');
      return;
    }
    // 두 자리가 모두 채워진 날짜는 그대로 두고, 비어있거나 한 명만 채워진 날짜만 채운다
    const filledDays = workingDays.filter(ds=>{ const a=getAssigned(ds); return a[0] && a[1]; });
    const openDays = workingDays.filter(ds=>{ const a=getAssigned(ds); return !(a[0] && a[1]); });

    if(openDays.length===0){
      alert('이번 달은 이미 모든 근무일이 배정되어 있습니다.');
      return;
    }

    // 이번 달 공정 배분 횟수는 기존에 이미 배정된(우선 지정 포함) 인원 수만큼부터 시작
    const assignCount = {};
    state.people.forEach(p=>{ assignCount[p.id]=0; });
    workingDays.forEach(ds=>{
      getAssigned(ds).forEach(pid=>{ if(pid) assignCount[pid] = (assignCount[pid]||0)+1; });
    });

    const failedDays = [];

    function sortByFairness(pool){
      const sorted = pool.slice().sort((p1,p2)=>{
        const hasTarget1 = p1.target!==null ? 1 : 0;
        const hasTarget2 = p2.target!==null ? 1 : 0;
        if(hasTarget1!==hasTarget2) return hasTarget2-hasTarget1; // targeted people first
        const c = (assignCount[p1.id]||0) - (assignCount[p2.id]||0);
        if(c!==0) return c;
        return Math.random()-0.5;
      });
      return sorted;
    }

    openDays.forEach(ds=>{
      const prevWD = getAdjacentWorkingDay(ds,-1);
      const nextWD = getAdjacentWorkingDay(ds,1);
      const prevAssigned = prevWD ? getAssigned(prevWD) : [];
      const nextAssigned = nextWD ? getAssigned(nextWD) : [];

      const cand = state.people.filter(p=>
        !isOnVacation(p.id, ds) &&
        !prevAssigned.includes(p.id) &&
        !nextAssigned.includes(p.id) &&
        (p.target===null || assignCount[p.id] < p.target)
      );

      const existing = getAssigned(ds);
      const fixedIdx = [0,1].find(i=> existing[i]); // 이미 한 명이 우선 지정되어 있는 자리

      if(fixedIdx!==undefined){
        // 한 자리는 고정, 나머지 한 자리만 채운다
        const fixedPid = existing[fixedIdx];
        const emptyIdx = fixedIdx===0 ? 1 : 0;
        const options = sortByFairness(cand.filter(p=> p.id!==fixedPid && pairValid(fixedPid, p.id)));
        if(options.length===0){
          failedDays.push(ds);
          return;
        }
        const picked = options[0];
        const arr = [existing[0]||'', existing[1]||''];
        arr[emptyIdx] = picked.id;
        state.assignments[ds] = arr;
        assignCount[picked.id] = (assignCount[picked.id]||0)+1;
        return;
      }

      if(cand.length<2){
        failedDays.push(ds);
        return;
      }

      const sorted = sortByFairness(cand);
      let pickedA=null, pickedB=null;
      outer:
      for(const a of sorted){
        for(const b of sorted){
          if(b.id===a.id) continue;
          if(pairValid(a.id, b.id)){
            pickedA=a; pickedB=b;
            break outer;
          }
        }
      }

      if(!pickedA || !pickedB){
        failedDays.push(ds);
        return;
      }
      state.assignments[ds] = [pickedA.id, pickedB.id];
      assignCount[pickedA.id] = (assignCount[pickedA.id]||0)+1;
      assignCount[pickedB.id] = (assignCount[pickedB.id]||0)+1;
    });

    renderCalendar();
    renderPeople();

    if(failedDays.length){
      alert(`자동 배정 완료. 다만 ${failedDays.length}일은 조건(휴가·연속 배정·그룹 규칙)을 만족하는 조합이 없어 배정하지 못했습니다:\n${failedDays.join(', ')}`);
    } else {
      alert('이번 달 근무일 전체를 배정했습니다.');
    }
  }

  // ---------- nav ----------
  document.getElementById('prevBtn').addEventListener('click', ()=>{
    state.viewMonth--;
    if(state.viewMonth<0){ state.viewMonth=11; state.viewYear--; }
    ensureDefaultHolidays();
    renderCalendar();
    renderPeople();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    state.viewMonth++;
    if(state.viewMonth>11){ state.viewMonth=0; state.viewYear++; }
    ensureDefaultHolidays();
    renderCalendar();
    renderPeople();
  });
  document.getElementById('autoBtn').addEventListener('click', autoAssignMonth);

  function dayHasLock(ds){
    const lk = state.locked[ds];
    return !!(lk && (lk[0] || lk[1]));
  }

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    const y = state.viewYear, m = state.viewMonth;
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const workingDays = [];
    for(let d=1; d<=daysInMonth; d++){
      const ds = iso(y,m,d);
      if(isWorkingDay(ds)) workingDays.push(ds);
    }
    if(!confirm(`${y}년 ${m+1}월의 배정을 초기화합니다. (고정된 사람이 있는 날짜는 유지) 계속할까요?`)) return;
    workingDays.forEach(ds=>{
      if(!dayHasLock(ds)) delete state.assignments[ds];
    });
    renderCalendar();
    renderPeople();
  });

  document.getElementById('resetAllBtn').addEventListener('click', ()=>{
    const y = state.viewYear, m = state.viewMonth;
    const daysInMonth = new Date(y, m+1, 0).getDate();
    if(!confirm(`${y}년 ${m+1}월의 모든 배정을 지우고 고정도 전부 해제합니다. 계속할까요?`)) return;
    for(let d=1; d<=daysInMonth; d++){
      const ds = iso(y,m,d);
      if(isWorkingDay(ds)){
        delete state.assignments[ds];
        delete state.locked[ds];
      }
    }
    renderCalendar();
    renderPeople();
  });

  // ---------- add person / holiday handlers ----------
  document.getElementById('addPersonBtn').addEventListener('click', ()=>{
    const name = document.getElementById('pName').value;
    const group = document.querySelector('input[name="addGroup"]:checked').value;
    addPerson(name, group);
    document.getElementById('pName').value='';
  });
  document.getElementById('pName').addEventListener('keydown', (e)=>{
    if(e.key==='Enter') document.getElementById('addPersonBtn').click();
  });
  document.getElementById('addHolBtn').addEventListener('click', ()=>{
    const d = document.getElementById('holDate').value;
    const l = document.getElementById('holLabel').value;
    addHoliday(d, l);
    document.getElementById('holDate').value='';
    document.getElementById('holLabel').value='';
  });

  document.getElementById('ruleA').addEventListener('change', (e)=>{
    state.groupRules.A = e.target.checked;
    renderCalendar();
  });
  document.getElementById('ruleB').addEventListener('change', (e)=>{
    state.groupRules.B = e.target.checked;
    renderCalendar();
  });

  // ---------- export / import ----------
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const data = {
      people: state.people,
      holidays: state.holidays,
      vacations: state.vacations,
      assignments: state.assignments,
      groupRules: state.groupRules,
      locked: state.locked
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `근무배정_${iso(state.viewYear, state.viewMonth, 1)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('importBtn').addEventListener('click', ()=>{
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const data = JSON.parse(reader.result);
        state.people = (data.people || []).map(p=>({...p, target: (p.target===undefined ? null : p.target)}));
        state.holidays = data.holidays || {};
        state.vacations = data.vacations || {};
        state.assignments = data.assignments || {};
        state.groupRules = data.groupRules || {A:false, B:true};
        state.locked = data.locked || {};
        document.getElementById('ruleA').checked = !!state.groupRules.A;
        document.getElementById('ruleB').checked = !!state.groupRules.B;
        ensureDefaultHolidays();
        renderPeople();
        renderCalendar();
      }catch(err){
        alert('파일을 불러오지 못했습니다. 올바른 JSON 파일인지 확인해 주세요.');
      }
    };
    reader.readAsText(file);
    e.target.value='';
  });

  // ---------- init ----------
  renderDowRow();
  renderPeople();
  renderCalendar();
})();
</script>
</body>
</html>
